<section class="orders-page">
  <div>
    <span class="orders-page__kicker">{{ 'supply-and-purchasing.orders-page.kicker' | translate }}</span>
    <h1 class="orders-page__title">{{ 'supply-and-purchasing.orders-page.title' | translate }}</h1>
    <p class="orders-page__description">{{ 'supply-and-purchasing.orders-page.description' | translate }}</p>
  </div>

  <div class="orders-page__workspace">
    <app-purchase-order-form-panel></app-purchase-order-form-panel>
    <app-purchase-orders-table
      [purchaseOrders]="store.purchaseOrders()"
      [loading]="store.loading()"
    ></app-purchase-orders-table>
  </div>
</section>
