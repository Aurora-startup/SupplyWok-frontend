<p-card styleClass="routes-panel">
  <ng-template pTemplate="header">
    <div class="routes-panel__header">
      <h2>{{ title() }}</h2>
    </div>
  </ng-template>

  @if (routes().length) {
    <div class="routes-panel__list">
      @for (route of routes(); track route.id) {
        <article class="routes-panel__item">
          <div class="routes-panel__item-head">
            <strong>{{ route.routeName }}</strong>
            <p-tag [value]="route.priority" severity="warn" />
          </div>
          <p>{{ route.schedule }}</p>
          <small>{{ route.timestamp }}</small>
        </article>
      }
    </div>
  } @else {
    <p class="routes-panel__empty">{{ emptyText() }}</p>
  }
</p-card>
